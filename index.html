<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ration Ruckus!</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface-light: #242836; --border: #2e3340;
    --text: #e8e8e8; --text-dim: #8890a0;
    --green: #7CB342; --green-bg: #1a2618;
    --amber: #F9A825; --amber-bg: #1e1a10;
    --red: #EF5350; --red-bg: #1e1214;
    --blue: #42A5F5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  #app { max-width: 800px; margin: 0 auto; padding: 16px; }
  .title { text-align:center; font-size:28px; font-weight:800; letter-spacing:2px; }
  .g { color: var(--green); } .r { color: var(--red); }
  .sub { text-align:center; font-size:13px; color:var(--text-dim); margin-bottom:20px; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
  .btn { border:none; border-radius:10px; padding:12px 24px; font-size:15px; font-weight:700; cursor:pointer; width:100%; display:block; margin-bottom:8px; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-amber { background:var(--amber); color:#000; }
  .btn-green { background:var(--green); color:#000; }
  .btn-dim { background:var(--surface-light); color:var(--text-dim); }
  .btn-small { padding:8px 16px; font-size:13px; width:auto; display:inline-block; margin:0 4px 4px 0; border:none; border-radius:8px; font-weight:700; cursor:pointer; }
  .input { background:var(--surface-light); border:2px solid var(--border); border-radius:10px; padding:12px 16px; font-size:16px; color:var(--text); width:100%; outline:none; text-align:center; margin-bottom:8px; }
  .input:focus { border-color:var(--amber); }
  .input-code { letter-spacing:6px; font-size:20px; text-transform:uppercase; }
  .form-stack { max-width:320px; margin:0 auto; }
  .error { color:var(--red); font-size:13px; text-align:center; margin-top:8px; }
  .room-code { font-size:36px; font-weight:800; letter-spacing:6px; color:var(--amber); text-align:center; margin-bottom:16px; }
  .player-row { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--surface-light); border-radius:8px; margin-bottom:4px; font-weight:600; font-size:14px; }
  .badge { display:inline-block; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; }
  .badge-amber { background:#F9A82522; color:var(--amber); }
  .badge-green { background:#7CB34222; color:var(--green); }
  .badge-red { background:#EF535022; color:var(--red); }
  .badge-blue { background:#42A5F522; color:var(--blue); }
  .header-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .turn-ind { font-size:13px; font-weight:700; color:var(--amber); }
  .players-bar { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { padding:6px 12px; border-radius:8px; font-size:12px; border:1px solid var(--border); background:var(--surface-light); }
  .chip-active { background:var(--amber-bg); border-color:var(--amber); }
  .chip-dead { background:var(--red-bg); border-color:#C62828; opacity:0.5; }
  .label { font-size:12px; font-weight:700; margin-bottom:8px; }
  .cards-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
  .card { border-radius:12px; padding:10px 12px; min-width:110px; max-width:130px; text-align:center; font-size:12px; flex-shrink:0; border:2px solid; }
  .card-s { background:var(--green-bg); border-color:var(--green); }
  .card-a { background:var(--amber-bg); border-color:var(--amber); }
  .card-play { cursor:pointer; }
  .card-dim { opacity:0.4; }
  .card-dash { border-style:dashed !important; }
  .emoji { font-size:28px; display:block; margin-bottom:4px; }
  .cname { font-weight:700; font-size:11px; line-height:1.2; }
  .cdesc { font-size:9px; color:var(--text-dim); margin-top:3px; line-height:1.3; }
  .log-box { max-height:180px; overflow-y:auto; }
  .log-entry { font-size:12px; padding:3px 0; border-bottom:1px solid var(--border); }
  .log-good { color:var(--green); } .log-bad { color:var(--red); } .log-event { color:var(--amber); }
  .log-warning { color:var(--text-dim); } .log-system { color:var(--text); }
  .deck-counts { display:flex; gap:12px; justify-content:center; font-size:11px; color:var(--text-dim); margin-top:8px; }
  .note { font-size:12px; color:var(--text-dim); text-align:center; margin-top:20px; line-height:1.6; }
  .overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }
  .overlay-content { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; max-width:700px; width:100%; max-height:90vh; overflow-y:auto; }
  .overlay-title { font-size:22px; font-weight:800; margin-bottom:16px; text-align:center; }
  .card-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .section-label { font-size:14px; font-weight:700; margin:16px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
  .event-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); z-index:200; display:flex; align-items:center; justify-content:center; animation:eventFadeIn 0.3s ease-out; }
  .event-card-big { text-align:center; padding:32px; border-radius:20px; border:3px solid; min-width:250px; animation:eventPulse 0.6s ease-out; }
  .event-card-big .emoji { font-size:64px; display:block; margin-bottom:12px; }
  .event-card-big .cname { font-size:24px; font-weight:800; display:block; margin-bottom:8px; }
  .event-card-big .cdesc { font-size:14px; display:block; }
  @keyframes eventFadeIn { from{opacity:0} to{opacity:1} }
  @keyframes eventPulse { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
  .rules-section { margin-bottom:16px; }
  .rules-section h3 { font-size:14px; color:var(--amber); margin-bottom:6px; }
  .rules-section p, .rules-section li { font-size:12px; color:var(--text-dim); line-height:1.6; }
  .rules-section ul { padding-left:18px; }
  #toast-container { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:150; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; }
  .toast { padding:10px 20px; border-radius:12px; font-size:14px; font-weight:700; text-align:center; animation:toastIn 0.3s ease-out, toastOut 0.4s ease-in 1.8s forwards; border:2px solid; max-width:350px; }
  .toast-action { background:var(--amber-bg); border-color:var(--amber); color:var(--amber); }
  .toast-reaction { background:#42A5F522; border-color:var(--blue); color:var(--blue); }
  .toast-gain { background:var(--green-bg); border-color:var(--green); color:var(--green); }
  .toast-loss { background:var(--red-bg); border-color:var(--red); color:var(--red); }
  .toast-event { background:var(--amber-bg); border-color:var(--amber); color:var(--amber); }
  @keyframes toastIn { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-10px)} }
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="app">Loading...</div>
<script>
var FIREBASE_URL = "https://ration-ruckus-default-rtdb.firebaseio.com";
var useLocal = false;

var DB = {
  get: async function(k) {
    if (!useLocal && FIREBASE_URL) {
      try { var r = await fetch(FIREBASE_URL+"/rooms/"+k+".json"); if(!r.ok) return null; return await r.json(); } catch(e) { return null; }
    }
    var v = localStorage.getItem("rr_"+k); return v ? JSON.parse(v) : null;
  },
  set: async function(k, v) {
    if (!useLocal && FIREBASE_URL) {
      try { await fetch(FIREBASE_URL+"/rooms/"+k+".json", {method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}); } catch(e) {}
    }
    localStorage.setItem("rr_"+k, JSON.stringify(v));
  }
};

var SUPPLY=[{name:"Acorn Stash",emoji:"\u{1F330}",count:4,value:1},{name:"Fish Scraps",emoji:"\u{1F41F}",count:4,value:1},{name:"Berry Haul",emoji:"\u{1FAD0}",count:4,value:1},{name:"Shiny Trinket",emoji:"\u{2728}",count:4,value:1},{name:"Honey Jar",emoji:"\u{1F36F}",count:4,value:1},{name:"Bird Egg",emoji:"\u{1F95A}",count:4,value:1},{name:"Mushroom Find",emoji:"\u{1F344}",count:4,value:1},{name:"Dumpster Jackpot",emoji:"\u{1F5D1}",count:2,value:2}];
var ACTIONS=[{name:"Scrounge",emoji:"\u{1F5D1}",count:10,type:"core",target:"self",desc:"Dig through the trash. Draw 1 Supply."},{name:"Hustle",emoji:"\u{1F4A8}",count:6,type:"core",target:"self",desc:"Quick paws! Draw 2 Action cards."},{name:"Sabotage",emoji:"\u{1F4A3}",count:5,type:"offensive",target:"other",desc:"Trash their stash! Target discards 1 Supply."},{name:"Pilfer",emoji:"\u{1F99D}",count:4,type:"offensive",target:"other",desc:"Sneaky paws! Steal 1 random Supply."},{name:"Pickpocket",emoji:"\u{1FAF3}",count:4,type:"offensive",target:"other",desc:"Nimble fingers! Steal 1 random Action."},{name:"Slow Down",emoji:"\u{1F43E}",count:6,type:"offensive",target:"other",desc:"Set a trap! Target plays max 1 Action next turn."},{name:"Boomerang",emoji:"\u{1FA83}",count:6,type:"reaction",target:"react",desc:"Not me! Redirect a targeted card to anyone."},{name:"Decoy Stash",emoji:"\u{1FA86}",count:5,type:"reaction",target:"react",desc:"Block a player's action that would cost you Supply. Not for Events."},{name:"Shelter",emoji:"\u{1F3DA}",count:6,type:"special",target:"self",desc:"Hunker in the den. Blocks the next Event. Expires after event."},{name:"Last Resort",emoji:"\u{1FA82}",count:2,type:"reaction",target:"react",desc:"Not today! Survive when forced below 0 Supply."},{name:"Foresight",emoji:"\u{1F441}",count:3,type:"special",target:"self",desc:"Peek top 3 Events. Pick which comes next."},{name:"Collateral Damage",emoji:"\u{1F9E8}",count:2,type:"special",target:"multi",desc:"Knock over the bins! You + 2 others each lose 1 Supply."},{name:"Recurring Nightmare",emoji:"\u{1F608}",count:2,type:"special",target:"others",desc:"Replay a discarded Event. You are immune."},{name:"Scavenger",emoji:"\u{1F99D}",count:2,type:"special",target:"self",desc:"Loot the fallen! Draw 1 Supply + 1 Action per eliminated player."},{name:"Coin Toss",emoji:"\u{1FA99}",count:3,type:"special",target:"other",desc:"Feeling lucky? Heads: you gain, they lose. Tails: opposite."}];
var EVENTS=[{name:"Raccoon Raid",emoji:"\u{1F629}",count:8,desc:"Rival raccoons raid everyone! Each player loses 1 Supply.",effect:-1},{name:"Dumpster Fire",emoji:"\u{1F525}",count:2,desc:"The dumpster is ablaze! Each player loses 2 Supply.",effect:-2},{name:"Lucky Dumpster",emoji:"\u{1F389}",count:3,desc:"Jackpot haul tonight! Each player gains 1 Supply.",effect:1},{name:"Spin the Bottle",emoji:"\u{1FA99}",count:2,desc:"Flip coins, lose per Heads (max 3).",effect:"spin"},{name:"Helping Paw",emoji:"\u{1F43E}",count:2,desc:"Pack looks out for the runt. Lowest Supply gains 1 Supply + 1 Action.",effect:"mercy"},{name:"Jealousy Tax",emoji:"\u{1F624}",count:2,desc:"Hoarding too much? The pack noticed. Highest Supply loses 2.",effect:"greed"},{name:"Meltdown",emoji:"\u{1F4A5}",count:1,desc:"Total chaos in the alley! All lose until someone hits 0.",effect:"meltdown"}];

var CORE=["Scrounge","Hustle","Sabotage","Pilfer","Pickpocket","Slow Down","Shelter","Foresight","Collateral Damage","Recurring Nightmare","Scavenger","Coin Toss"];
var REACT_CARDS=["Boomerang","Decoy Stash","Last Resort"];

function buildDeck(types,dt){var c=[],id=0;types.forEach(function(t){for(var i=0;i<t.count;i++)c.push(Object.assign({},t,{id:dt+"_"+id++,deck:dt}));});return c;}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function genCode(){var c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789",s="";for(var i=0;i<5;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function initGame(players){
  var sd=shuffle(buildDeck(SUPPLY,"s")),ad=shuffle(buildDeck(ACTIONS,"a")),ed=shuffle(buildDeck(EVENTS,"e"));
  var n=players.length,sc=n<=4?3:2,ac=n<=4?4:5;
  var hands=players.map(function(p){return Object.assign({},p,{supply:sd.splice(0,sc),actions:ad.splice(0,ac),eliminated:false,slowedDown:false,sheltered:false});});
  return{status:"playing",players:hands,supplyDeck:sd,actionDeck:ad,eventDeck:ed,discardSupply:[],discardAction:[],discardEvent:[],currentPlayer:0,cycle:1,turnPhase:"draw",actionsPlayed:0,maxActions:3,log:[{msg:"Game started! Let the raccoon ruckus begin! \u{1F99D}",type:"system"}],firstCycle:true,turnsThisCycle:0,pendingSabotage:null,pendingReaction:null,pendingForesight:null,pendingNightmare:null,pendingCoinDecoy:null,toasts:[],eventCard:null,version:Date.now()};
}

var S={screen:"menu",name:"",code:"",myIdx:-1,game:null,err:"",poll:null,pTarget:null,showOverlay:null,eventAnim:null,_shownVer:0};
var $=document.getElementById("app");

function set(u){Object.assign(S,u);if(u.game)displayNotifs(u.game);render();}
function displayNotifs(g){if(!g||!g.version||g.version===S._shownVer)return;S._shownVer=g.version;if(g.eventCard){S.eventAnim=g.eventCard;setTimeout(function(){S.eventAnim=null;render();},2500);}if(g.toasts)g.toasts.forEach(function(t){showToast(t.emoji,t.text,t.type);});}

function sanitizeGame(g){
  if(!g)return g;
  g.supplyDeck=g.supplyDeck||[];g.actionDeck=g.actionDeck||[];g.eventDeck=g.eventDeck||[];
  g.discardSupply=g.discardSupply||[];g.discardAction=g.discardAction||[];g.discardEvent=g.discardEvent||[];
  g.log=g.log||[];g.players=g.players||[];g.toasts=g.toasts||[];
  for(var p=0;p<g.players.length;p++){g.players[p].supply=g.players[p].supply||[];g.players[p].actions=g.players[p].actions||[];}
  return g;
}

function poll(code,name){
  if(S.poll)clearInterval(S.poll);
  S.poll=setInterval(async function(){
    var d=await DB.get(code);if(!d)return;
    sanitizeGame(d);
    if(S.screen==="lobby"&&d.status==="playing"){clearInterval(S.poll);set({screen:"game",myIdx:d.players.findIndex(function(p){return p.name===name;}),game:d});poll(code,name);}
    else if(S.screen==="game"&&d.status==="lobby"){clearInterval(S.poll);set({screen:"lobby",game:d,pTarget:null,showOverlay:null,eventAnim:null});poll(code,name);}
    else if(S.screen==="game"&&d.version!==S.game.version){set({game:d});}
    else if(S.screen==="lobby"){set({game:d});}
  },1500);
}

window.createRoom=async function(){
  var n=S.name.trim();if(!n){set({err:"Enter your name!"});return;}
  var c=genCode(),lobby={status:"lobby",host:n,players:[{name:n,id:0}],created:Date.now(),version:Date.now()};
  await DB.set(c,lobby);set({screen:"lobby",code:c,game:lobby,err:""});poll(c,n);
};
window.joinRoom=async function(){
  var n=S.name.trim(),c=S.code.trim().toUpperCase();
  if(!n){set({err:"Enter your name!"});return;}if(c.length<5){set({err:"Enter valid code!"});return;}
  var d=await DB.get(c);if(!d){set({err:"Room not found!"});return;}
  if(d.status!=="lobby"){set({err:"Game already started!"});return;}if(d.players.length>=8){set({err:"Room full!"});return;}
  if(d.players.find(function(p){return p.name===n;})){set({err:"Name taken!"});return;}
  d.players.push({name:n,id:d.players.length});d.version=Date.now();
  await DB.set(c,d);set({screen:"lobby",code:c,game:d,err:""});poll(c,n);
};
window.startGameBtn=async function(){
  if(S.game.players.length<2){set({err:"Need 2+ players!"});return;}
  var g=initGame(S.game.players);await DB.set(S.code,g);
  if(S.poll)clearInterval(S.poll);
  set({screen:"game",myIdx:S.game.players.findIndex(function(p){return p.name===S.name.trim();}),game:g,err:""});
  poll(S.code,S.name.trim());
};

function hasPendingState(g){
  return g.pendingSabotage||g.pendingReaction||g.pendingForesight||g.pendingNightmare||g.pendingCoinDecoy;
}

async function freshGame(){
  try{
    var f=await DB.get(S.code);
    if(f){
      sanitizeGame(f);
      S.game=JSON.parse(JSON.stringify(f));
      return JSON.parse(JSON.stringify(f));
    }
  }catch(e){console.error("freshGame fetch error",e);}
  return JSON.parse(JSON.stringify(S.game));
}

window.drawAction=async function(){
  var g=await freshGame();
  if(g.pendingReaction||g.pendingCoinDecoy)return;
  var i=S.myIdx;
  if(g.actionDeck.length>0){g.players[i].actions.push(g.actionDeck.shift());g.log.push({msg:S.name+" drew an Action card.",type:"system"});}
  else{g.log.push({msg:"Action deck empty!",type:"warning"});}
  g.turnPhase="play";g.actionsPlayed=0;g.maxActions=g.players[i].slowedDown?1:3;g.players[i].slowedDown=false;
  g.version=Date.now();await DB.set(S.code,g);set({game:g});
};

window.playCard=async function(ci){
  var g=await freshGame();
  var me=g.players[S.myIdx],card=me.actions[ci];
  if(!card||CORE.indexOf(card.name)<0||g.actionsPlayed>=g.maxActions)return;
  if(card.target==="other"){set({pTarget:{ci:ci,card:card}});return;}
  if(card.target==="multi"){
    var othersAlive=g.players.filter(function(p,idx){return idx!==S.myIdx&&!p.eliminated;});
    if(othersAlive.length===0)return;
    if(othersAlive.length===1){
      // 2-player mode: target the sole opponent, they lose 2 supplies
      set({pTarget:{ci:ci,card:card,twoPlayer:true,soloTarget:g.players.indexOf(othersAlive[0])}});return;
    }
    set({pTarget:{ci:ci,card:card,needTwo:true,selected:[]}});return;
  }
  if(card.name==="Scrounge")window.execScrounge(ci);
  else if(card.name==="Hustle")window.execHustle(ci);
  else if(card.name==="Shelter")window.execShelter(ci);
  else if(card.name==="Foresight")window.execForesight(ci);
  else if(card.name==="Recurring Nightmare")window.execRecurringNightmare(ci);
  else if(card.name==="Scavenger")window.execScavenger(ci);
};

window.execShelter=async function(ci){
  var g=await freshGame(),i=S.myIdx;
  g.discardAction.push(g.players[i].actions.splice(ci,1)[0]);
  g.players[i].sheltered=true;
  g.log.push({msg:S.name+" activated Shelter! Protected from the next Event.",type:"good"});
  g.toasts=[{emoji:"\u{1F3DA}",text:S.name+" activated Shelter!",type:"action"}];
  g.actionsPlayed++;g.version=Date.now();await DB.set(S.code,g);set({game:g,pTarget:null});
};

// ═══ FORESIGHT — peek top 3 events, pick 1 for top, rest go to bottom ═══
window.execForesight=async function(ci){
  var g=await freshGame(),i=S.myIdx;
  g.discardAction.push(g.players[i].actions.splice(ci,1)[0]);
  if(g.eventDeck.length===0){
    g.log.push({msg:S.name+" used Foresight but the Event deck is empty!",type:"warning"});
    g.actionsPlayed++;g.version=Date.now();await DB.set(S.code,g);set({game:g,pTarget:null});
    return;
  }
  var top3=g.eventDeck.splice(0,Math.min(3,g.eventDeck.length));
  g.pendingForesight={playerIdx:i,cards:top3};
  g.log.push({msg:S.name+" used Foresight! Peeking at upcoming Events...",type:"event"});
  g.toasts=[{emoji:"\u{1F441}",text:S.name+" used Foresight!",type:"action"}];
  g.actionsPlayed++;g.version=Date.now();await DB.set(S.code,g);set({game:g,pTarget:null});
};
window.foresightPick=async function(cardIdx){
  var g=await freshGame();
  var pf=g.pendingForesight;
  if(!pf||pf.playerIdx!==S.myIdx)return;
  var picked=pf.cards.splice(cardIdx,1)[0];
  // Put picked on top, rest on bottom
  g.eventDeck.unshift(picked);
  for(var j=0;j<pf.cards.length;j++){g.eventDeck.push(pf.cards[j]);}
  g.log.push({msg:S.name+" chose which Event comes next...",type:"event"});
  g.pendingForesight=null;
  g.version=Date.now();await DB.set(S.code,g);set({game:g});
};

// ═══ COLLATERAL DAMAGE — you + 2 others each lose 1 supply ═══
window.execCollateral=async function(targets){
  var pt=S.pTarget,g=await freshGame(),i=S.myIdx;
  g.discardAction.push(g.players[i].actions.splice(pt.ci,1)[0]);
  // Self loses 1 supply
  if(g.players[i].supply.length>0){
    var lost=g.players[i].supply.pop();
    g.discardSupply.push(lost);
    g.log.push({msg:S.name+" lost 1 supply from Collateral Damage!",type:"bad"});
  }
  // Each target loses 1 supply (random)
  for(var t=0;t<targets.length;t++){
    var ti=targets[t];
    if(g.players[ti].supply.length>0){
      var ri=Math.floor(Math.random()*g.players[ti].supply.length);
      var sl=g.players[ti].supply.splice(ri,1)[0];
      g.discardSupply.push(sl);
      g.log.push({msg:g.players[ti].name+" lost 1 supply from Collateral Damage!",type:"bad"});
    }else{

// Check if target player has a Boomerang card
function targetHasBoomerang(g, targetIdx){
  return g.players[targetIdx].actions.some(function(a){return a.name==="Boomerang";});
}

// Check if target player has a Decoy Stash (for supply-loss cards only)

}

// Execute targeted card — now checks if reaction window is needed
window.execTargeted=async function(ti){
  var pt=S.pTarget;
  if(!pt)return;
  var card=pt.card;

  // Collateral Damage uses multi-select — handle toggle
  if(pt.needTwo){
    window.collateralPick(ti);
    return;
  }

  var g=await freshGame(),i=S.myIdx;
  var played=g.players[i].actions.splice(pt.ci,1)[0];
  g.discardAction.push(played);
  var tn=g.players[ti].name;

  // Cards that can be Boomeranged: Sabotage, Pilfer, Pickpocket, Slow Down, Coin Toss
  var canBoomerang=targetHasBoomerang(g,ti) && !g.players[ti].eliminated;
  // Cards that can be Decoyed: supply losses from players (Sabotage, Pilfer, Coin Toss)
  var isSupplyLoss=(card.name==="Sabotage"||card.name==="Pilfer");
  var canDecoy=isSupplyLoss && targetHasDecoy(g,ti) && !g.players[ti].eliminated;

  if(canBoomerang || canDecoy){
    // Enter reaction window — 10 second timer
    g.pendingReaction={
      cardName:card.name,
      attackerIdx:i,
      attackerName:S.name,
      targetIdx:ti,
      targetName:tn,
      canBoomerang:canBoomerang,
      canDecoy:canDecoy,
      expiresAt:Date.now()+10000,
      resolved:false
    };
    g.log.push({msg:S.name+" played "+card.name+" on "+tn+"! "+tn+" has 10 seconds to react...",type:"event"});
    g.toasts=[{emoji:card.emoji,text:S.name+" played "+card.name+" on "+tn+"!",type:"action"}];
    g.actionsPlayed++;g.version=Date.now();await DB.set(S.code,g);set({game:g,pTarget:null});
    // Start checking for timeout
    window.checkReactionTimeout();
  } else {
    // No reactions possible — resolve immediately
    g.log.push({msg:S.name+" played "+card.name+" on "+tn+"!",type:"bad"});
    g.toasts=[{emoji:card.emoji,text:S.name+" played "+card.name+" on "+tn+"!",type:"action"}];
    resolveTargetedEffect(g, card.name, i, ti);
    g.actionsPlayed++;g.version=Date.now();await DB.set(S.code,g);set({game:g,pTarget:null});
    if(g.pendingCoinDecoy)window.checkCoinDecoyTimeout();
  }
};

// Resolve the actual effect of a targeted card
function resolveTargetedEffect(g, cardName, attackerIdx, targetIdx){
  var tn=g.players[targetIdx].name;
  var an=g.players[attackerIdx].name;
  if(cardName==="Sabotage"){
    if(g.players[targetIdx].supply.length>0){
      g.pendingSabotage={targetIdx:targetIdx,by:an};
      g.log.push({msg:tn+" must discard 1 Supply!",type:"bad"});
    }else{g.log.push({msg:tn+" has no supplies!",type:"warning"});}
  }else if(cardName==="Pilfer"){
    if(g.players[targetIdx].supply.length>0){
      var ri=Math.floor(Math.random()*g.players[targetIdx].supply.length);
      var st=g.players[targetIdx].supply.splice(ri,1)[0];
      g.players[attackerIdx].supply.push(st);
      g.log.push({msg:an+" pilfered a Supply from "+tn+"!",type:"bad"});
    }else{g.log.push({msg:tn+" has nothing!",type:"warning"});}
  }else if(cardName==="Pickpocket"){
    if(g.players[targetIdx].actions.length>0){
      var ri2=Math.floor(Math.random()*g.players[targetIdx].actions.length);
      var st2=g.players[targetIdx].actions.splice(ri2,1)[0];
      g.players[attackerIdx].actions.push(st2);
      g.log.push({msg:an+" pickpocketed from "+tn+"!",type:"bad"});
    }else{g.log.push({msg:tn+" has no actions!",type:"warning"});}
  }else if(cardName==="Slow Down"){
    g.players[targetIdx].slowedDown=true;
    g.log.push({msg:an+" slowed down "+tn+"!",type:"bad"});
  }else if(cardName==="Coin Toss"){
    var heads=Math.random()<0.5;
    var winnerIdx=heads?attackerIdx:targetIdx;
    var loserIdx=heads?targetIdx:attackerIdx;
    var winnerName=g.players[winnerIdx].name;
    var loserName=g.players[loserIdx].name;
    g.log.push({msg:an+" flipped "+(heads?"HEADS":"TAILS")+" against "+tn+"!",type:heads?"good":"bad"});
    g.toasts.push({emoji:"\u{1FA99}",text:an+" flipped "+(heads?"HEADS":"TAILS")+"!",type:heads?"gain":"loss"});
    // Winner gains supply immediately
    if(g.supplyDeck.length>0){var drawn=g.supplyDeck.shift();g.players[winnerIdx].supply.push(drawn);g.log.push({msg:winnerName+" gained a Supply!",type:"good"});}
    // Check if loser has Decoy Stash — offer post-flip
    var loserHasDecoy=g.players[loserIdx].actions.some(function(a){return a.name==="Decoy Stash";});
    if(loserHasDecoy&&g.players[loserIdx].supply.length>0){
      g.pendingCoinDecoy={loserIdx:loserIdx,loserName:loserName,expiresAt:Date.now()+10000};
      g.log.push({msg:loserName+" can use Decoy Stash to block the supply loss! 10s to react...",type:"event"});
    }else{
      if(g.players[loserIdx].supply.length>0){var ri3=Math.floor(Math.random()*g.players[loserIdx].supply.length);var lost=g.players[loserIdx].supply.splice(ri3,1)[0];g.discardSupply.push(lost);g.log.push({msg:loserName+" lost a Supply!",type:"bad"});}
      else{g.log.push({msg:loserName+" had no supplies to lose!",type:"warning"});}
    }
  }
}

  var newCanDecoy=isSupplyLoss&&targetHasDecoy(g,newTargetIdx)&&!g.players[newTargetIdx].eliminated;

window.endTurn=async function(){
  var g=await freshGame();
  if(g.pendingReaction||g.pendingCoinDecoy)return;
  var alive=g.players.filter(function(p){return!p.eliminated;});
  g.log.push({msg:S.name+" ended their turn.",type:"system"});g.turnsThisCycle++;g.actionsPlayed=0;g.turnPhase="draw";
  var nx=(g.currentPlayer+1)%g.players.length,lp=0;
  while(g.players[nx].eliminated&&lp<g.players.length){nx=(nx+1)%g.players.length;lp++;}
  g.currentPlayer=nx;

  // Check if cycle is complete — trigger Event
  if(g.turnsThisCycle>=alive.length){
    g.turnsThisCycle=0;
    // Draw and resolve Event
    if(g.eventDeck.length>0){
      var evt=g.eventDeck.shift();
      g.discardEvent.push(evt);
      g.log.push({msg:"=== EVENT: "+evt.name+" "+evt.emoji+" ===",type:"event"});
      g.log.push({msg:evt.desc,type:"event"});
      g.eventCard=evt;g.toasts=[];
      resolveEvent(g, evt, -1); // -1 means no immunity
    }else{
      g.log.push({msg:"=== No Events left in deck! ===",type:"warning"});
    }
    // Clear all shelter flags after event
    for(var s=0;s<g.players.length;s++){g.players[s].sheltered=false;}
    // Check eliminations
    checkEliminations(g);
    // Check win
    var aliveNow=g.players.filter(function(p){return!p.eliminated;});
    if(aliveNow.length<=1){
      g.status="finished";
      if(aliveNow.length===1){
        g.log.push({msg:"=== "+aliveNow[0].name+" WINS! Top raccoon! ===",type:"event"});
      }else{
        g.log.push({msg:"=== Everyone eliminated! No winner! ===",type:"event"});
      }
    }else{
      g.cycle++;
      g.firstCycle=false;
      g.log.push({msg:"=== Cycle "+g.cycle+" begins! ===",type:"system"});
    }
  }
  g.version=Date.now();await DB.set(S.code,g);set({game:g,pTarget:null});
};

// ═══ EVENT RESOLUTION ═══
function resolveEvent(g, evt, immuneIdx){
  if(!g._forcedLoss)g._forcedLoss={};
  var effect=evt.effect;
  if(typeof effect==="number"){
    // Simple +/- supply
    for(var p=0;p<g.players.length;p++){
      if(g.players[p].eliminated)continue;
      if(p===immuneIdx)continue;
      if(g.players[p].sheltered){g.log.push({msg:g.players[p].name+" was protected by Shelter!",type:"good"});continue;}
      if(effect<0){
        var toLose=Math.abs(effect);
        // First cycle protection
        if(g.firstCycle){
          var maxLoss=Math.max(0,g.players[p].supply.length-1);
          toLose=Math.min(toLose,maxLoss);
          if(toLose===0){g.log.push({msg:g.players[p].name+" protected by first cycle rules!",type:"system"});continue;}
        }
        // Track if forced below 0 (asked to lose more than they have)
        if(toLose>g.players[p].supply.length)g._forcedLoss[p]=true;
        toLose=Math.min(toLose,g.players[p].supply.length);
        for(var l=0;l<toLose;l++){var lost=g.players[p].supply.pop();g.discardSupply.push(lost);}
        if(toLose>0)g.log.push({msg:g.players[p].name+" lost "+toLose+" supply!",type:"bad"});
      }else{
        for(var a=0;a<effect;a++){if(g.supplyDeck.length>0)g.players[p].supply.push(g.supplyDeck.shift());}
        g.log.push({msg:g.players[p].name+" gained "+effect+" supply!",type:"good"});
      }
    }
  }else if(effect==="spin"){
    // Spin the Bottle — flip coins, lose per heads (max 3)
    for(var p2=0;p2<g.players.length;p2++){
      if(g.players[p2].eliminated||p2===immuneIdx)continue;
      if(g.players[p2].sheltered){g.log.push({msg:g.players[p2].name+" was protected by Shelter!",type:"good"});continue;}
      var losses=0;
      for(var f=0;f<3;f++){
        if(Math.random()<0.5){losses++;}else{break;}
      }
      if(g.firstCycle){var maxL=Math.max(0,g.players[p2].supply.length-1);losses=Math.min(losses,maxL);}
      if(losses>g.players[p2].supply.length)g._forcedLoss[p2]=true;
      losses=Math.min(losses,g.players[p2].supply.length);
      for(var fl=0;fl<losses;fl++){var fLost=g.players[p2].supply.pop();g.discardSupply.push(fLost);}
      g.log.push({msg:g.players[p2].name+" flipped "+losses+" heads — lost "+losses+" supply!",type:losses>0?"bad":"system"});
    }
  }else if(effect==="mercy"){
    // Helping Hand — lowest supply players gain 1 supply + 1 action
    var minSup=999;
    for(var pm=0;pm<g.players.length;pm++){if(!g.players[pm].eliminated&&pm!==immuneIdx)minSup=Math.min(minSup,g.players[pm].supply.length);}
    for(var pm2=0;pm2<g.players.length;pm2++){
      if(g.players[pm2].eliminated||pm2===immuneIdx)continue;
      if(g.players[pm2].supply.length===minSup){
        if(g.supplyDeck.length>0)g.players[pm2].supply.push(g.supplyDeck.shift());
        if(g.actionDeck.length>0)g.players[pm2].actions.push(g.actionDeck.shift());
        g.log.push({msg:g.players[pm2].name+" got a Helping Hand! +1 Supply +1 Action",type:"good"});
      }
    }
  }else if(effect==="greed"){
    // Jealousy Tax — highest supply players lose 2
    var maxSup=0;
    for(var pg=0;pg<g.players.length;pg++){if(!g.players[pg].eliminated&&pg!==immuneIdx)maxSup=Math.max(maxSup,g.players[pg].supply.length);}
    for(var pg2=0;pg2<g.players.length;pg2++){
      if(g.players[pg2].eliminated||pg2===immuneIdx)continue;
      if(g.players[pg2].sheltered){g.log.push({msg:g.players[pg2].name+" was protected by Shelter!",type:"good"});continue;}
      if(g.players[pg2].supply.length===maxSup){
        var gLose=2;
        if(g.firstCycle){gLose=Math.min(gLose,Math.max(0,g.players[pg2].supply.length-1));}
        if(gLose>g.players[pg2].supply.length)g._forcedLoss[pg2]=true;
        gLose=Math.min(gLose,g.players[pg2].supply.length);
        for(var gl=0;gl<gLose;gl++){var gLost=g.players[pg2].supply.pop();g.discardSupply.push(gLost);}
        if(gLose>0)g.log.push({msg:g.players[pg2].name+" hit by Jealousy Tax! Lost "+gLose+" supply!",type:"bad"});
      }
    }
  }else if(effect==="meltdown"){
    // Meltdown — everyone loses supply until at least 1 player hits 0
    g.log.push({msg:"MELTDOWN! Everyone loses supply until someone hits 0!",type:"bad"});
    var someoneAtZero=false;
    while(!someoneAtZero){
      for(var pm3=0;pm3<g.players.length;pm3++){
        if(g.players[pm3].eliminated||pm3===immuneIdx)continue;
        if(g.players[pm3].sheltered)continue;
        if(g.players[pm3].supply.length>0){
          var mLost=g.players[pm3].supply.pop();g.discardSupply.push(mLost);
        }
        if(g.players[pm3].supply.length===0)someoneAtZero=true;
      }
      // Safety: if all sheltered or immune, break
      var canLose=false;
      for(var chk=0;chk<g.players.length;chk++){
        if(!g.players[chk].eliminated&&chk!==immuneIdx&&!g.players[chk].sheltered&&g.players[chk].supply.length>0)canLose=true;
      }
      if(!canLose)break;
    }
    for(var pm4=0;pm4<g.players.length;pm4++){
      if(g.players[pm4].eliminated||pm4===immuneIdx)continue;
      if(g.players[pm4].sheltered){g.log.push({msg:g.players[pm4].name+" was protected by Shelter!",type:"good"});continue;}
      // Meltdown forces loss — anyone at 0 was forced below their original count
      if(g.players[pm4].supply.length===0)g._forcedLoss[pm4]=true;
      g.log.push({msg:g.players[pm4].name+" now has "+g.players[pm4].supply.length+" supply.",type:g.players[pm4].supply.length===0?"bad":"system"});
    }
  }
}

// ═══ ELIMINATION CHECK ═══
// Players are only eliminated if an event FORCED them below 0 (i.e., they had supply
// taken when they couldn't afford it). Being at exactly 0 is NOT elimination.
// We track this via g._forcedLoss[playerIdx] set during resolveEvent.
function checkEliminations(g){
  var forced=g._forcedLoss||{};
  for(var p=0;p<g.players.length;p++){
    if(g.players[p].eliminated)continue;
    if(g.players[p].supply.length===0&&forced[p]){
      // This player was forced to lose supply they didn't have — elimination candidate
      var lrIdx=g.players[p].actions.findIndex(function(a){return a.name==="Last Resort";});
      if(lrIdx>=0){
        g.discardAction.push(g.players[p].actions.splice(lrIdx,1)[0]);
        g.log.push({msg:g.players[p].name+" used Last Resort to survive!",type:"good"});
        g.toasts.push({emoji:"\u{1FA82}",text:g.players[p].name+" used Last Resort!",type:"reaction"});
      }else{
        g.players[p].eliminated=true;
        g.log.push({msg:g.players[p].name+" has been ELIMINATED! Forced to lose more than they had!",type:"bad"});
        g.toasts.push({emoji:"\u{2620}",text:g.players[p].name+" ELIMINATED!",type:"loss"});
      }
    }
  }
  delete g._forcedLoss;
}

};

      // 2-player Collateral Damage confirmation
      var stName=g.players[S.pTarget.soloTarget].name;
      h+='<div class="panel" style="border:2px solid var(--red)"><p style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:4px">&#x1F9E8; Collateral Damage &mdash; 2 Player Mode</p><p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">You lose 1 Supply, '+esc(stName)+' loses 2 Supply.</p><div><button class="btn-small" style="background:var(--red);color:#fff" onclick="execCollateral2P()">Confirm</button> <button class="btn-small" style="background:var(--surface-light);color:var(--text-dim)" onclick="set({pTarget:null})">Cancel</button></div></div>';
    } else if(S.pTarget.needTwo){
      // Collateral Damage — pick 2 targets
      var sel=S.pTarget.selected||[];
      var ctb=g.players.map(function(p,i){if(i===S.myIdx||p.eliminated)return'';var isSel=sel.indexOf(i)>=0;return'<button class="btn-small" style="background:'+(isSel?'var(--red)':'var(--amber)')+';color:#000" onclick="collateralPick('+i+')">'+esc(p.name)+(isSel?' &#10003;':'')+'</button>';}).join("");
      h+='<div class="panel" style="border:2px solid var(--red)"><p style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:4px">&#x1F9E8; Collateral Damage &mdash; Pick 2 targets (you also lose 1 Supply):</p><p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">Selected: '+sel.length+'/2</p><div>'+ctb+'</div><div style="margin-top:8px"><button class="btn-small" style="background:var(--red);color:#fff" onclick="collateralConfirm()"'+(sel.length!==2?' disabled':'')+'>Confirm</button> <button class="btn-small" style="background:var(--surface-light);color:var(--text-dim)" onclick="set({pTarget:null})">Cancel</button></div></div>';
    } else {
      // Standard single target
      var tb=g.players.map(function(p,i){if(i===S.myIdx||p.eliminated)return'';return'<button class="btn-small" style="background:var(--amber);color:#000" onclick="execTargeted('+i+')">'+esc(p.name)+' (&#128230;'+p.supply.length+')</button>';}).join("");
      h+='<div class="panel" style="border:2px solid var(--amber)"><p style="font-size:14px;font-weight:700;color:var(--amber);margin-bottom:8px">'+S.pTarget.card.emoji+' '+esc(S.pTarget.card.name)+' &mdash; Choose a target:</p><div>'+tb+'<button class="btn-small" style="background:var(--surface-light);color:var(--text-dim)" onclick="set({pTarget:null})">Cancel</button></div></div>';
    }
  }
  // Foresight picker — only shown to the player who used it
  if(g.pendingForesight&&g.pendingForesight.playerIdx===S.myIdx){
    var fc=g.pendingForesight.cards.map(function(c,i){return'<div class="card" style="background:#1E1E1E;border-color:#444;cursor:pointer" onclick="foresightPick('+i+')"><span class="emoji">'+c.emoji+'</span><span class="cname">'+esc(c.name)+'</span><span class="cdesc">'+esc(c.desc)+'</span></div>';}).join("");
    h+='<div class="panel" style="border:2px solid var(--blue)"><p style="font-size:14px;font-weight:700;color:var(--blue);margin-bottom:4px">&#x1F441; Foresight &mdash; Choose which Event comes next:</p><p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">The others go to the bottom of the deck.</p><div class="cards-row">'+fc+'</div></div>';
  }else if(g.pendingForesight){
    h+='<div class="panel" style="border:1px solid var(--blue)"><p style="font-size:13px;color:var(--blue)">&#x1F441; '+esc(g.players[g.pendingForesight.playerIdx].name)+' is using Foresight...</p></div>';
  }
  // Recurring Nightmare picker — only shown to the player who used it
  if(g.pendingNightmare&&g.pendingNightmare.playerIdx===S.myIdx){
    var nc=g.pendingNightmare.events.map(function(c,i){return'<div class="card" style="background:#1E1E1E;border-color:#444;cursor:pointer" onclick="nightmarePick('+i+')"><span class="emoji">'+c.emoji+'</span><span class="cname">'+esc(c.name)+'</span><span class="cdesc">'+esc(c.desc)+'</span></div>';}).join("");
    h+='<div class="panel" style="border:2px solid var(--red)"><p style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:4px">&#x1F608; Recurring Nightmare &mdash; Choose an Event to replay (you are immune):</p><div class="cards-row">'+nc+'</div></div>';
  }else if(g.pendingNightmare){
    h+='<div class="panel" style="border:1px solid var(--red)"><p style="font-size:13px;color:var(--red)">&#x1F608; '+esc(g.players[g.pendingNightmare.playerIdx].name)+' is choosing a Recurring Nightmare...</p></div>';
  }
  if(me&&!me.eliminated){var scs=me.supply.length===0?'<p style="font-size:12px;color:var(--text-dim)">No supplies! You are in danger!</p>':me.supply.map(function(s){return'<div class="card card-s"><span class="emoji">'+s.emoji+'</span><span class="cname">'+esc(s.name)+'</span>'+(s.value===2?'<span class="badge badge-amber" style="margin-top:3px;font-size:9px">x2</span>':'')+'</div>';}).join("");h+='<div class="panel"><div class="label" style="color:var(--green)">YOUR SUPPLIES ('+me.supply.length+')</div><div class="cards-row">'+scs+'</div></div>';}
  if(me&&!me.eliminated){var hasPending=!!(g.pendingReaction||g.pendingCoinDecoy);var canPlay=myTurn&&g.turnPhase==="play"&&g.actionsPlayed<g.maxActions&&!hasPending;var acs=me.actions.length===0?'<p style="font-size:12px;color:var(--text-dim)">No actions!</p>':me.actions.map(function(a,i){var ok=canPlay&&CORE.indexOf(a.name)>=0;var dash=a.type==="reaction"?"card-dash":"";return'<div class="card card-a '+dash+' '+(ok?"card-play":"card-dim")+'" '+(ok?'onclick="playCard('+i+')"':'')+'><span class="emoji">'+a.emoji+'</span><span class="cname">'+esc(a.name)+'</span><span class="cdesc">'+esc(a.desc)+'</span>'+(a.type==="reaction"?'<span class="badge badge-red" style="margin-top:3px;font-size:8px">REACT</span>':'')+(a.type==="special"?'<span class="badge badge-blue" style="margin-top:3px;font-size:8px">SPECIAL</span>':'')+'</div>';}).join("");h+='<div class="panel"><div class="label" style="color:var(--amber)">YOUR ACTIONS ('+me.actions.length+')'+(canPlay?' <span style="color:var(--text-dim);font-weight:400">&mdash; tap to play ('+g.actionsPlayed+'/'+g.maxActions+')</span>':'')+(hasPending&&myTurn?' <span style="color:var(--red);font-weight:400">&mdash; waiting for reaction to resolve</span>':'')+'</div><div class="cards-row">'+acs+'</div></div>';}
  if(myTurn&&!winner&&me&&!me.eliminated&&!g.pendingReaction){if(g.turnPhase==="draw")h+='<button class="btn btn-amber" onclick="drawAction()">&#127183; Draw Action Card</button>';else h+='<button class="btn btn-green" onclick="endTurn()">&#10003; End Turn '+(g.actionsPlayed>0?'('+g.actionsPlayed+' played)':'(pass)')+'</button>';}
  if(me&&me.eliminated)h+='<div class="panel" style="text-align:center;border:2px solid var(--red)"><div style="font-size:30px;margin-bottom:6px">&#9760;</div><p style="font-weight:700;color:var(--red)">You have been eliminated!</p><p style="font-size:12px;color:var(--text-dim)">Spectating...</p></div>';
  var logs=(g.log||[]).slice(-20).map(function(e){return'<div class="log-entry log-'+e.type+'">'+esc(e.msg)+'</div>';}).join("");
  h+='<div class="panel"><div class="label" style="color:var(--text-dim)">GAME LOG</div><div class="log-box" id="lb">'+logs+'</div></div>';
  h+='<div class="deck-counts"><span>&#128230; Supply: '+(g.supplyDeck?g.supplyDeck.length:0)+'</span><span>&#127183; Action: '+(g.actionDeck?g.actionDeck.length:0)+'</span><span>&#9889; Event: '+(g.eventDeck?g.eventDeck.length:0)+'</span></div>';
  h+='<div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button class="btn-small" style="background:var(--surface-light);color:var(--text-dim)" onclick="set({showOverlay:\'decklist\'})">&#127183; Cards</button><button class="btn-small" style="background:var(--surface-light);color:var(--text-dim)" onclick="set({showOverlay:\'rules\'})">&#128214; Rules</button></div>';
  $.innerHTML=h;
  var lb=document.getElementById("lb");if(lb)lb.scrollTop=lb.scrollHeight;
}

function renderSetup(){
  $.innerHTML='<div class="title"><span class="g">Ration</span> <span class="r">Ruckus!</span></div><p class="sub">Firebase Setup (Free)</p><div class="panel" style="max-width:500px;margin:0 auto"><p style="font-size:14px;font-weight:700;margin-bottom:12px">Quick Setup (5 minutes):</p><p style="font-size:13px;color:var(--text-dim);margin-bottom:6px;line-height:1.6">1. Go to <b>console.firebase.google.com</b></p><p style="font-size:13px;color:var(--text-dim);margin-bottom:6px;line-height:1.6">2. Create a project, name it anything</p><p style="font-size:13px;color:var(--text-dim);margin-bottom:6px;line-height:1.6">3. Click <b>Databases &amp; Storage</b> then <b>Realtime Database</b></p><p style="font-size:13px;color:var(--text-dim);margin-bottom:6px;line-height:1.6">4. Click <b>Create Database</b>, any location, <b>Start in test mode</b></p><p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.6">5. Copy your database URL (starts with https://)</p><input class="input" id="fbi" placeholder="Paste Firebase URL here" style="text-align:left;letter-spacing:0;font-size:14px" value="'+esc(FIREBASE_URL)+'"><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-green" onclick="saveFirebase()">Save &amp; Connect</button><button class="btn btn-dim" onclick="set({screen:\'menu\'})">Cancel</button></div>'+(FIREBASE_URL?'<p style="font-size:11px;color:var(--green);margin-top:8px">Connected: '+esc(FIREBASE_URL)+'</p>':'')+'</div>';
}

render();
</script>
</body>
